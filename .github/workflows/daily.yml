# 나라장터 교통용역 입찰공고 매일 알림
# 리포지토리에 이 파일을 .github/workflows/daily.yml 로 두면 매일 자동 실행됩니다.
# 먼저 Settings > Secrets and variables > Actions 에 아래 3개 Secret 등록 필요:
#   G2B_API_KEY, KAKAO_REST_API_KEY, KAKAO_REFRESH_TOKEN

name: narajangteo-daily-notify

on:
  schedule:
    # UTC 기준. 0 0 * * * = 매일 00:00 UTC = 09:07 KST
    - cron: '7 0 * * *'
  workflow_dispatch:   # 수동 실행 버튼

# 중복 전송 방지용 data/sent.json 을 워크플로가 다시 커밋해야 하므로 쓰기 권한 필요.
permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Run daily notify
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python daily_notify.py

      # 이번 실행에서 새로 보낸 공고번호를 data/sent.json 에 기록했다면
      # 다음 실행이 같은 공고를 중복 전송하지 않도록 리포에 커밋해 둡니다.
      - name: Commit updated sent.json (dedup 상태 저장)
        run: |
          if [ -n "$(git status --porcelain data/sent.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/sent.json
            git commit -m "chore: update sent.json [skip ci]"
            git push
          else
            echo "sent.json 변경 없음 → 커밋 생략"
          fi
